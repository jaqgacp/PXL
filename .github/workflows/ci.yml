name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  db-tests:
    # A fresh runner replays the entire migration chain from scratch before the
    # pgTAP suite runs, so this job is also the fresh-database migration gate
    # (PXL-AUD-022 / PXL-DA-006).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      - run: supabase db start
      - run: supabase test db
